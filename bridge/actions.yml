# KLOR Bridge Action Registry
# ───────────────────────────
# Maps firmware action IDs to behaviors. The firmware sends ASCII codes
# (A=0x41 through Z=0x5A) when a letter is pressed in command mode.
#
# HOW TO ADD/CHANGE ACTIONS:
#   1. Find the letter you want to assign in this file
#   2. Change type from "unconfigured" to "llm_text" or another type
#   3. Set prompt_key to match a template name in prompts.yml
#   4. Add/edit the matching prompt template in prompts.yml
#   5. No firmware reflash needed — prompt text changes are live on next use
#      but actions.yml changes still require a bridge restart
#
# Action types:
#   llm_text      — Copy selected text → LLM transform → copy result to clipboard
#   stt_toggle    — Start/stop speech-to-text recording
#   prompt_picker — Open searchable popup to insert a text snippet from snippets.yml
#   unconfigured  — Placeholder; bridge logs a notice and does nothing
#
# Special non-letter action IDs (sent directly by firmware, not via command mode):
#   0x10  ACTION_STT            — Speech-to-text toggle (T key, depth 1-3)
#   0x11  ACTION_BRIGHTNESS_UP  — Brightness increase (right encoder CW)
#   0x12  ACTION_BRIGHTNESS_DOWN— Brightness decrease (right encoder CCW)
#
# The T key (0x54) is NOT listed here — it uses a special firmware path
# that sends ACTION_STT (0x10) with a depth parameter (1-3 taps).

actions:
  # ── Configured actions ──────────────────────────────────────────

  improve:
    action_id: 0x49          # I key
    type: llm_text
    key: i
    prompt_key: improve_writing
    description: Improve writing quality of selected text

  write_email:
    action_id: 0x52          # R key
    type: llm_text
    key: r
    prompt_key: write_email
    description: Rewrite selected text as a Danish/Nordic professional email

  prompt_expand:
    action_id: 0x45          # E key
    type: llm_text
    key: e
    prompt_key: prompt_expand
    description: Amplify highlighted text into a stronger LLM prompt

  grammar:
    action_id: 0x47          # G key
    type: llm_text
    key: g
    prompt_key: fix_grammar
    description: Light polish — fix spelling, grammar, and punctuation only

  summarize:
    action_id: 0x53          # S key
    type: llm_text
    key: s
    prompt_key: summarize
    description: Summarize selected text concisely

  translate_da_en:
    action_id: 0x44          # D key
    type: llm_text
    key: d
    prompt_key: translate_da_en
    description: Translate Danish text to English

  translate_en_da:
    action_id: 0x4E          # N key
    type: llm_text
    key: "n"
    prompt_key: translate_en_da
    description: Translate English text to Danish

  transcribe:
    action_id: 0x10          # Special STT action (not ASCII — firmware sends 0x10)
    type: stt_toggle
    key: t
    description: Toggle speech-to-text (tap count = correction depth)

  # ── Unconfigured placeholders ───────────────────────────────────
  # These keys are mapped in firmware but have no action assigned yet.
  # To activate one, change type to "llm_text" and set a prompt_key.

