# KLOR Bridge — Prompt Snippet Library
# ─────────────────────────────────────
# Used by the Prompt Picker (double-tap RALT → P).
# The bridge shows snippet names in a searchable popup (walker --dmenu).
# Selecting a snippet copies its text to the clipboard for pasting.
#
# Format:
#   - name: Short display name (shown in picker)
#     category: Grouping label (shown as prefix: "category: name")
#     text: |
#       Full text copied to clipboard when selected.
#       Can be multi-line. Trailing newlines are stripped.
#
# Add your own snippets below. Restart the bridge after editing.

snippets:
  - name: Expand this properly
    category: Prompting
    text: |
      Expand the following into a stronger, more complete result. Think through the
      task fully before answering. Do not be lazy or superficial. Cover hidden
      assumptions, edge cases, tradeoffs, and concrete next steps. Keep the result
      well-structured and useful.

  - name: Write this email
    category: Email
    text: |
      Rewrite the following as a polished professional email. Keep it clear,
      direct, and friendly. Use a concise Nordic business tone. End with a clear
      next step or ask.

  - name: Explain this like I'm 10
    category: Explanation
    text: |
      Explain the following as if you are teaching a smart 10-year-old. Use simple
      language, short sentences, and one concrete example. Avoid jargon unless you
      define it immediately.

  - name: Make this concise
    category: Writing
    text: |
      Rewrite the following to be more concise and direct. Remove filler words,
      repetition, and weak qualifiers. Keep the meaning intact.

  - name: Improve the writing
    category: Writing
    text: |
      Rewrite the following so it reads better. Improve clarity, structure, tone,
      and flow while preserving the original meaning.

  - name: Summarize the key points
    category: Analysis
    text: |
      Summarize the following into the most important points only. Use short bullet
      points and focus on what matters for decision-making.

  - name: Extract action items
    category: Analysis
    text: |
      Extract the concrete action items from the following. Return a numbered list.
      Include owner and deadline when they are stated or clearly implied.

  - name: Review this code
    category: Code
    text: |
      Review the following code like a senior engineer. Focus on bugs, risks,
      regressions, edge cases, and missing tests. Put the most important findings first.

  - name: Explain this code
    category: Code
    text: |
      Explain what the following code does in plain language. Cover the purpose,
      main logic, important data flow, and anything surprising or risky.

  - name: Improve this prompt
    category: Prompting
    text: |
      Rewrite the following prompt so it produces a better result from a language
      model. Make it more specific, add constraints, define the desired output,
      and remove ambiguity. Return only the improved prompt.

  - name: Reply to this email
    category: Email
    text: |
      Write a professional reply to the following email. Keep it concise, polite,
      and clear. Answer the core points directly and end with the next step.

  - name: Follow up on this
    category: Email
    text: |
      Write a concise follow-up email about the following. Be polite, direct, and
      specific about what response or action is needed.

  - name: Make this more formal
    category: Writing
    text: |
      Rewrite the following in a more formal and professional tone. Keep the same
      meaning, but improve precision, structure, and polish.

  - name: Make this more natural
    category: Writing
    text: |
      Rewrite the following so it sounds more natural and fluent. Remove awkward
      phrasing and make it read like strong native writing.

  - name: Translate Danish to English
    category: Translation
    text: |
      Translate the following Danish text into natural, fluent English. Preserve
      the meaning, tone, and any important terminology.

  - name: Translate English to Danish
    category: Translation
    text: |
      Translate the following English text into natural, fluent Danish. Preserve
      the meaning, tone, and any important terminology.

  - name: Turn this into meeting notes
    category: Analysis
    text: |
      Turn the following into clean meeting notes. Use short sections for context,
      decisions, action items, and open questions.

  - name: Write a decision memo
    category: Analysis
    text: |
      Turn the following into a short decision memo. Include the decision, key
      rationale, alternatives considered, tradeoffs, and recommended next steps.

  - name: Turn this into a bug report
    category: Code
    text: |
      Turn the following into a high-quality bug report. Include summary,
      environment, reproduction steps, expected behavior, actual behavior, and
      any likely technical clues.

  - name: Refactor this code
    category: Code
    text: |
      Refactor the following code to improve readability, maintainability, and
      correctness. Keep behavior the same unless a bug is clearly identified.

  - name: Write tests for this
    category: Code
    text: |
      Write tests for the following code. Cover the main path, important edge
      cases, and failure modes. Use the testing style that fits the language.

  - name: Brainstorm strong options
    category: Creative
    text: |
      Generate several strong options for the following. Include practical ideas,
      one more ambitious idea, and the main tradeoffs for each option.
