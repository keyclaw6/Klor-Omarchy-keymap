# KLOR Bridge — Prompt Snippet Library
# ─────────────────────────────────────
# Used by the Prompt Picker (double-tap RALT → P).
# The bridge shows snippet names in a searchable popup (walker --dmenu).
# Selecting a snippet copies its text to the clipboard for pasting.
#
# Format:
#   - name: Short display name (shown in picker)
#     category: Grouping label (shown as prefix: "category: name")
#     text: |
#       Full text copied to clipboard when selected.
#       Can be multi-line. Trailing newlines are stripped.
#
# Add your own snippets below. Restart the bridge after editing.

snippets:
  # ── Writing ──────────────────────────────────────────────────

  - name: Make it concise
    category: Writing
    text: |
      Rewrite the following to be more concise and direct. Remove filler words,
      redundancies, and unnecessary qualifiers. Keep the meaning intact.

  - name: Make it formal
    category: Writing
    text: |
      Rewrite the following in a formal, professional tone suitable for business
      communication. Maintain the original meaning and key points.

  - name: Make it casual
    category: Writing
    text: |
      Rewrite the following in a casual, conversational tone. Keep it friendly
      and approachable while preserving the core message.

  - name: Simplify language
    category: Writing
    text: |
      Rewrite the following using simpler words and shorter sentences. Target a
      general audience with no domain expertise. Avoid jargon.

  - name: Add detail
    category: Writing
    text: |
      Expand the following with more detail, examples, and explanation. Make it
      thorough while keeping it well-organized and readable.

  - name: Fix flow and transitions
    category: Writing
    text: |
      Improve the flow and transitions between paragraphs and ideas in the
      following text. Add connecting phrases where needed. Don't change the content.

  # ── Email ────────────────────────────────────────────────────

  - name: Professional reply
    category: Email
    text: |
      Write a professional email reply to the following. Be polite, clear, and
      action-oriented. Use a Nordic business communication style (direct but friendly).

  - name: Decline politely
    category: Email
    text: |
      Write a polite email declining the following request or invitation. Express
      appreciation, give a brief reason, and leave the door open for future opportunities.

  - name: Follow-up email
    category: Email
    text: |
      Write a professional follow-up email regarding the following topic. Be concise,
      reference the previous interaction, and clearly state the next steps or question.

  - name: Meeting request
    category: Email
    text: |
      Write a professional email requesting a meeting about the following topic.
      Suggest 2-3 time slots, state the purpose clearly, and keep it brief.

  # ── Code ─────────────────────────────────────────────────────

  - name: Explain this code
    category: Code
    text: |
      Explain what the following code does in plain language. Cover the purpose,
      key logic, and any notable patterns or potential issues.

  - name: Review this code
    category: Code
    text: |
      Review the following code for bugs, performance issues, security concerns,
      and style improvements. List findings as bullet points with severity.

  - name: Add comments
    category: Code
    text: |
      Add clear, concise inline comments to the following code. Explain the "why"
      not the "what". Don't over-comment obvious lines.

  - name: Write tests
    category: Code
    text: |
      Write unit tests for the following code. Cover happy paths, edge cases, and
      error conditions. Use the testing framework that matches the language.

  - name: Refactor this
    category: Code
    text: |
      Refactor the following code to improve readability, maintainability, and
      adherence to best practices. Explain what you changed and why.

  # ── Translation ──────────────────────────────────────────────

  - name: Danish to English
    category: Translation
    text: |
      Translate the following Danish text to natural, fluent English. Preserve
      tone, intent, and any domain-specific terminology.

  - name: English to Danish
    category: Translation
    text: |
      Translate the following English text to natural, fluent Danish. Preserve
      tone, intent, and any domain-specific terminology.

  - name: Improve English (non-native)
    category: Translation
    text: |
      The following was written by a non-native English speaker. Improve the
      grammar, word choice, and phrasing to sound natural while preserving the
      original meaning and voice.

  # ── Analysis ─────────────────────────────────────────────────

  - name: Summarize key points
    category: Analysis
    text: |
      Summarize the following into 3-5 bullet points capturing the most important
      information. Be concise and factual.

  - name: List pros and cons
    category: Analysis
    text: |
      Analyze the following and list the pros and cons in two columns. Be balanced
      and specific. Include practical implications.

  - name: Extract action items
    category: Analysis
    text: |
      Extract all action items, tasks, and commitments from the following text.
      Format as a numbered list with responsible party (if mentioned) and deadline.

  - name: Identify assumptions
    category: Analysis
    text: |
      Identify the key assumptions in the following text. For each assumption,
      note whether it's stated or implied, and assess the risk if it's wrong.

  # ── Creative ─────────────────────────────────────────────────

  - name: Brainstorm ideas
    category: Creative
    text: |
      Generate 10 creative ideas related to the following topic. Include a mix of
      conventional and unconventional approaches. Brief description for each.

  - name: Write an outline
    category: Creative
    text: |
      Create a structured outline for a document about the following topic. Include
      main sections, subsections, and key points to cover in each.

  - name: Devil's advocate
    category: Creative
    text: |
      Take a devil's advocate position on the following. Present the strongest
      counterarguments, potential risks, and overlooked considerations.

  # ── Prompting ────────────────────────────────────────────────

  - name: Strengthen this prompt
    category: Prompting
    text: |
      Improve the following LLM prompt to get better results. Add specificity,
      constraints, output format requirements, and examples where helpful.
      Return only the improved prompt.

  - name: Chain of thought
    category: Prompting
    text: |
      Solve the following step by step. Show your reasoning at each stage before
      giving the final answer. If you're uncertain about any step, say so.

  - name: Structured output
    category: Prompting
    text: |
      Respond to the following in structured JSON format. Include all relevant
      fields with clear key names. Ensure the output is valid JSON.
